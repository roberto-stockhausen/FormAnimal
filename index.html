<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Formulário de Adoção </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <img class="image" src="Assets/liq-p.jpg" alt="Liq"> <br> <!-- Esse gato está em todos os meus projetos recentes. É quase como se fosse uma "assinatura"-->
        <img class="image" src="Assets/Borzoi.jpg" alt="Liq"> <br>
        <img class="image" src="Assets/MoldSpore.webp" alt="Empty Space"> <br>
        <img class="image" src="Assets/DoesntExist.jpg" alt="Empty Space"> <br>
        <img class="image" src="Assets/SmileDog.webp" alt="Empty Space">
    </div>
    <div class="master">
        <h1> Formulário de adoção </h1>
        <form id="formadocao">
            <div class="question">
                <label for="nome"> Digite seu nome: </label>
                <input id="nome" type="text"  required> <br>
            </div>
            <div class="question">
                <label for="email"> Insira seu e-mail: </label>
                <input id="email" type="text"  required> <br>
            </div>
            <div class="question">
                <label for="numero"> Insira seu número de telefone: </label>
                <input id="numero" type="text"  required> <br>
            </div>
            <div class="question">
                <label for="idade"> Insira sua Idade: </label>
                <input id="idade" type="number" max="120" min="1"  required> <br>
            </div>
            <div class="question">
                <label for="cpf"> Insira seu CPF: </label>
                <input id="cpf" type="text" required> <br>
            </div>
            <div class="question">
                <label for="cidade"> Insira sua Cidade: </label>
                <input id="cidade" type="text" required> <br>
            </div>
            <div class="question">
                <label> Complemento: </label> <br>
                <input id="casa" type="radio" name="compl">
                <label for="casa"> Casa </label> <br>
                <input id="apartamento" type="radio" name="compl">
                <label for="apartamento"> Apartamento </label> <br>
            </div>
            <div class="question">
                <label> Apartamento permite animais?: </label> <br>
                <input id="PermSim" type="radio" name="permt">
                <label for="PermSim"> Sim </label> <br>
                <input id="PermNao" type="radio" name="permt">
                <label for="PermNao"> Não </label> <br>
            </div>
            <div class="question">
                <label> Possui quintal? </label> <br>
                <input id="QuintalSim" type="radio" name="quint">
                <label for="QuintalSim"> Sim </label> <br>
                <input id="QuintalNao" type="radio" name="quint">
                <label for="QuintalNao"> Não </label> <br>
            </div>
            <div class="question">
                <label> O quintal é seguro? (Responda apenas se tiver quintal) </label> <br>
                <input id="QuintalSeguro" type="radio" name="segur">
                <label for="QuintalSeguro"> Sim </label> <br>
                <input id="QuintalNaoSeguro" type="radio" name="segur">
                <label for="QuintalNaoSeguro"> Não </label> <br>
            </div>
            <div class="question">
                <label> Já teve pet antes? </label> <br>
                <input id="AntesSim" type="radio" name="petan">
                <label for="AntesSim"> Sim </label> <br>
                <input id="AntesNao" type="radio" name="petan">
                <label for="AntesNao"> Não </label> <br>
            </div>
            <div class="question">
                <label for="horas"> Quantas horas ele ficará sozinho: </label>
                <input id="horas" type="number" max="24" min="0"  required> <br>
            </div>
            <div class="question">
                <label for="motive"> Descreva o motivo da adoção: (Max. 500 caracteres) </label> <br>
                <textarea class="motivearea" name="motive" id="motive" maxlength="500"  required> </textarea> <br>
            </div>
            <div class="question">
                <label for="terms"> Você aceita os termos de responsabilidade? </label>
                <input id="terms" type="checkbox" name="termo"> <br>
                <input type="submit" value="Enviar">
            </div>
        </form>
        <div id="resultado"> </div>
    </div>
    <div>
        <img class="image" src="Assets/JuninRuindade.jpg" alt="Empty Space"> <br>
        <img class="image" src="Assets/GoatWashed.jpg" alt="Empty Space"> <br>
        <img class="image" src="Assets/EggDog.jpg" alt="Empty Space"> <br>
        <img class="image" src="Assets/HangInThere.jpg" alt="Empty Space"> <br>
        <img class="image" src="Assets/KatanaDog.png" alt="Empty Space">
    </div>
    <script src="scripts.js"> </script>
</body>

</html>
